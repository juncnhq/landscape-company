services:
  postgres:
    image: postgres:16-alpine
    container_name: landscape_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: landscape
      POSTGRES_PASSWORD: landscape123
      POSTGRES_DB: landscape_company
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
